<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voiced Dice Roller</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main>
        <div id="dices" class="area">
        </div>
        <div id="dice_creator" class="area">
            <h2>Crear dado: </h2>
            <div id="automaticDice">
                <button id="d4">1d4</button>
                <button id="d6">1d6</button>
                <button id="d8">1d8</button>
                <button id="d10">1d10</button>
                <button id="d12">1d12</button>
                <button id="d20">1d20</button>
            </div>
            <form id="infoDado" name="infoDado">
                <div>
                    <label for="faces">Número de caras: </label>
                    <input type="number" name="faces" id="faces" min="1" step="1" required> 
                </div>
                <div>
                    <label for="num">Número de dados a añadir: </label>
                    <input type="number" name="num" id="num" min="1" step="1" required>
                </div>
                <button id="create" type="button">Crear Dado</button>
            </form>
        </div>
        <button id="roll">Lanzar dado</button>
        <div id="resultadoDiv">
            <label for="resultado">Resultado: </label>
            <input type="text" name="resultado" id="resultado" readonly>
        </div>
    </main>
    <script src="./script.js"></script>
</body>
</html>
